name: Job - Check Package Versions

on:
  workflow_call:
    inputs:
      has_changes:
        required: true
        type: string
    secrets:
      ORG_REPO_TOKEN:
        required: true

jobs:
  check-versions:
    name: Check No Snapshot Versions
    if: inputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ORG_REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0

      - name: Check package versions are not snapshots
        shell: bash
        run: bash ./scripts/CI-check-no-snapshot.sh
