name: Job - Identify Target Packages

on:
  workflow_call:
    inputs:
      changed_packages:
        required: true
        type: string
    secrets:
      ORG_REPO_TOKEN:
        required: true
    outputs:
      packages:
        description: 'Consolidated JSON array of packages to build/publish'
        value: ${{ jobs.target.outputs.packages }}
      has_changes:
        description: 'Boolean indicating if any packages were detected'
        value: ${{ jobs.target.outputs.has_changes }}

jobs:
  target:
    name: Identify Target Packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.combine.outputs.packages }}
      has_changes: ${{ steps.combine.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ORG_REPO_TOKEN }}

      - name: Detect New Packages
        id: detect
        run: |
          NEW_PKGS=$(bash scripts/ci-detect-new-packages.sh)
          echo "new=$NEW_PKGS" >> "$GITHUB_OUTPUT"

      - name: Combine Packages
        id: combine
        env:
          CHANGED: ${{ inputs.changed_packages }}
          NEW: ${{ steps.detect.outputs.new }}
        run: |
          COMBINED=$(echo "$CHANGED $NEW" | jq -s -c 'add | unique')
          RESOLVED=$(node scripts/ci-resolve-build-order.js "$COMBINED")
          echo "packages=$RESOLVED" >> "$GITHUB_OUTPUT"
          HAS_CHANGES=$(echo "$RESOLVED" | jq 'length > 0')
          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
