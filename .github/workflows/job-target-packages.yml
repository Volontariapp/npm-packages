name: Job - Identify Target Packages

on:
  workflow_call:
    inputs:
      changed_packages:
        required: true
        type: string
    secrets:
      ORG_REPO_TOKEN:
        required: true
    outputs:
      packages:
        description: 'Consolidated JSON array of packages to build/publish'
        value: ${{ jobs.target.outputs.packages }}
      has_changes:
        description: 'Boolean indicating if any packages were detected'
        value: ${{ jobs.target.outputs.has_changes }}
      snapshot_suffix:
        description: 'Shared suffix for snapshot versions'
        value: ${{ jobs.target.outputs.snapshot_suffix }}
      json_plan:
        description: 'Complete execution plan with hashes'
        value: ${{ jobs.target.outputs.json_plan }}

jobs:
  target:
    name: Identify Target Packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.plan.outputs.packages }}
      has_changes: ${{ steps.plan.outputs.has_changes }}
      snapshot_suffix: ${{ steps.plan.outputs.snapshot_suffix }}
      json_plan: ${{ steps.plan.outputs.json_plan }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_REPO_TOKEN }}

      - name: Calculate Fingerprints & Plan
        id: plan
        run: |
          PLAN=$(python3 scripts/ci-fingerprint.py)
          echo "Full Plan: $PLAN"
          echo "json_plan=$PLAN" >> "$GITHUB_OUTPUT"
          
          # Extract only packages that need building
          TO_BUILD=$(echo "$PLAN" | jq -c '[.[] | select(.action == "BUILD") | .id]')
          echo "packages=$TO_BUILD" >> "$GITHUB_OUTPUT"
          
          HAS_CHANGES=$(echo "$TO_BUILD" | jq 'length > 0')
          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          
          # Stable suffix for tagging actions, but actual versions use the hashes
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "snapshot_suffix=snapshot.$SHA_SHORT" >> "$GITHUB_OUTPUT"
