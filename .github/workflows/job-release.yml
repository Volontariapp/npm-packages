name: Job - Version Changelogs & Publish

on:
  workflow_call:
      changed_packages:
        required: false
        type: string
      json_plan:
        required: false
        type: string
    secrets:
      ORG_REPO_TOKEN:
        required: true
      NPM_TOKEN:
        required: true

jobs:
  release:
    name: Version Changelogs & Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_REPO_TOKEN }}
          fetch-depth: 0

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: yarn
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: yarn install --immutable

      - name: Unified NPM & Yarn Auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          yarn config set 'npmRegistries["//registry.npmjs.org/"].npmAuthToken' "${{ secrets.NPM_TOKEN }}"

      - name: Version and publish packages
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Use the plan to feed the publish script
          echo '${{ inputs.json_plan }}' > .changeset/.plan.json
          bash scripts/ci-package-publish.sh --changed-packages '${{ inputs.changed_packages }}' --plan .changeset/.plan.json

      - name: Download coverage artifacts
        if: github.event_name == 'pull_request' || github.event.pull_request != null
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts
          pattern: coverage-summary-*

      - name: Post Comment on PR
        if: github.event_name == 'pull_request' || github.event.pull_request != null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -z "$PR_NUMBER" ] && [ "${{ github.event_name }}" == "pull_request" ]; then
             # Try fallback for some PR events
             PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
          fi

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            TAGS_FILE=".changeset/.snapshot-tags"
            if [ -f "$TAGS_FILE" ]; then
              while read -r tag; do
                # Extract base package name (folder name)
                FULL_NAME=$(echo "$tag" | cut -d'@' -f1)
                NAME=$(echo "$FULL_NAME" | sed 's|^@volontariapp/||')
                VER=$(echo "$tag" | cut -d'@' -f2)
                
                # Try to find coverage summary for this package
                SUMMARY_FILE="coverage-artifacts/coverage-summary-$NAME/coverage-summary.json"
                REPORT=""
                if [ -f "$SUMMARY_FILE" ]; then
                  LINES=$(jq -r '.total.lines.pct' "$SUMMARY_FILE")
                  STMTS=$(jq -r '.total.statements.pct' "$SUMMARY_FILE")
                  FUNCS=$(jq -r '.total.functions.pct' "$SUMMARY_FILE")
                  BRCHS=$(jq -r '.total.branches.pct' "$SUMMARY_FILE")
                  REPORT=$(printf '### 📊 Rapport de CI\n\n| Type | Couverture |\n| :--- | :--- |\n| 📏 Lines | **%s%%** |\n| 📄 Statements | **%s%%** |\n| 📞 Functions | **%s%%** |\n| 🌿 Branches | **%s%%** |\n\n[🔍 Voir le rapport HTML détaillé](https://github.com/%s/actions/runs/%s#artifacts)\n' \
                    "$LINES" "$STMTS" "$FUNCS" "$BRCHS" "${{ github.repository }}" "${{ github.run_id }}")
                fi

                # Logic to determine if it was a Lazy Deployment
                PLAN_INFO=$(echo '${{ inputs.json_plan }}' | jq -r ".[] | select(.name == \"$FULL_NAME\")")
                ACTION=$(echo "$PLAN_INFO" | jq -r '.action // "BUILD"')
                LAZY_NOTE=""
                RECAP_ICON="🚀"
                [ "$ACTION" == "SKIP" ] && LAZY_NOTE=" *(♻️ Idéal - Récupéré du cache)*" && RECAP_ICON="♻️"

                BODY="$RECAP_ICON Nouvelle version (snapshot) de \`$FULL_NAME\` disponible$LAZY_NOTE :
                
                $REPORT
                
                **📦 Installation**
                \`\`\`bash
                yarn add $tag
                \`\`\`

                **🔄 Mise à jour**
                \`\`\`bash
                yarn up $tag
                \`\`\`"
                
                gh pr comment "$PR_NUMBER" --body "$BODY"
              done < "$TAGS_FILE"
            fi
          fi
