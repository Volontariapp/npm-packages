name: Job - Version Changelogs & Publish

on:
  workflow_call:
    inputs:
      changed_packages:
        required: true
        type: string
    secrets:
      ORG_REPO_TOKEN:
        required: true
      NPM_TOKEN:
        required: true

jobs:
  release:
    name: Version Changelogs & Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_REPO_TOKEN }}
          fetch-depth: 0

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: yarn
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: yarn install --immutable

      - name: Unified NPM & Yarn Auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          yarn config set 'npmRegistries["//registry.npmjs.org/"].npmAuthToken' "${{ secrets.NPM_TOKEN }}"

      - name: Version and publish packages
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bash scripts/ci-package-publish.sh --changed-packages '${{ inputs.changed_packages }}'

      - name: Post Comment on PR
        if: github.event_name == 'pull_request' || github.event.pull_request != null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -z "$PR_NUMBER" ] && [ "${{ github.event_name }}" == "pull_request" ]; then
             # Try fallback for some PR events
             PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
          fi

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            TAGS_FILE=".changeset/.snapshot-tags"
            if [ -f "$TAGS_FILE" ]; then
              while read -r tag; do
                NAME=$(echo "$tag" | cut -d'@' -f1 | sed 's|^@volontariapp/||')
                FULL_NAME=$(echo "$tag" | cut -d'@' -f1)
                VER=$(echo "$tag" | cut -d'@' -f2)
                
                BODY="🚀 Nouvelle version (snapshot) de \`$NAME\` disponible :
                
                **📦 Installation**
                \`\`\`bash
                yarn add $tag
                \`\`\`

                **🔄 Mise à jour**
                \`\`\`bash
                yarn up $tag
                \`\`\`"
                
                gh pr comment "$PR_NUMBER" --body "$BODY"
              done < "$TAGS_FILE"
            fi
          fi
