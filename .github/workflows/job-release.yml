name: Job - Version Changelogs & Publish

on:
  workflow_call:
    inputs:
      changed_packages:
        required: false
        type: string
      json_plan:
        required: false
        type: string
    secrets:
      ORG_REPO_TOKEN:
        required: true
      NPM_TOKEN:
        required: true

jobs:
  release:
    name: Version Changelogs & Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_REPO_TOKEN }}
          fetch-depth: 0

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: yarn
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: yarn install --immutable

      - name: Unified NPM & Yarn Auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          yarn config set 'npmRegistries["//registry.npmjs.org/"].npmAuthToken' "${{ secrets.NPM_TOKEN }}"

      - name: Version and publish packages
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          JSON_PLAN: ${{ inputs.json_plan }}
          CHANGED_PACKAGES: ${{ inputs.changed_packages }}
        run: |
          # Use the plan to feed the publish script
          echo "$JSON_PLAN" > .changeset/.plan.json
          bash scripts/ci-package-publish.sh --changed-packages "$CHANGED_PACKAGES" --plan .changeset/.plan.json

      - name: Download coverage artifacts
        if: github.event_name == 'pull_request' || github.event.pull_request != null
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts
          pattern: coverage-summary-*

      - name: Post Comment on PR
        if: github.event_name == 'pull_request' || github.event.pull_request != null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JSON_PLAN: ${{ inputs.json_plan }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -z "$PR_NUMBER" ] && [ "${{ github.event_name }}" == "pull_request" ]; then
             # Try fallback for some PR events
             PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
          fi

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            TAGS_FILE=".changeset/.snapshot-tags"
            if [ -f "$TAGS_FILE" ]; then
              while read -r tag; do
                # Extract base package name (folder name)
                FULL_NAME=$(echo "$tag" | cut -d'@' -f1)
                # Try to find coverage summary
                NAME=$(echo "$FULL_NAME" | sed 's|^@volontariapp/||')
                REPORT=""
                SUMMARY_FILE="coverage-artifacts/coverage-summary-$NAME/coverage-summary.json"

                # Fetch coverage summary for this package
                if [ -f "$SUMMARY_FILE" ]; then
                  LINES=$(jq -r '.total.lines.pct' "$SUMMARY_FILE")
                  STMTS=$(jq -r '.total.statements.pct' "$SUMMARY_FILE")
                  FUNCS=$(jq -r '.total.functions.pct' "$SUMMARY_FILE")
                  BRCHS=$(jq -r '.total.branches.pct' "$SUMMARY_FILE")
                  REPORT=$(printf '%s\n%s\n%s\n%s\n%s\n%s\n%s' \
                    "### 📊 Rapport de CI" \
                    "| Type | Couverture |" \
                    "| :--- | :--- |" \
                    "| 📏 Lines | **${LINES}%** |" \
                    "| 📄 Statements | **${STMTS}%** |" \
                    "| 📞 Functions | **${FUNCS}%** |" \
                    "| 🌿 Branches | **${BRCHS}%** |")
                else
                  REPORT="> [!NOTE]
                  Pas de rapport de couverture trouvé pour ce package."
                fi

                PR_NUMBER="${{ github.event.pull_request.number }}"
                if [ -z "$PR_NUMBER" ] && [ "${{ github.event_name }}" == "pull_request" ]; then
                  # Try fallback for some PR events
                  PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
                fi

                if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
                  REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
                  gh pr comment "$PR_NUMBER" --body "🚀 Nouvelle version de \`$PKG\` :
                  $REPORT

                  [🔍 Voir le rapport HTML détaillé]($REPORT_URL)

                  **📦 Installation**
                  \`\`\`bash
                  yarn add $TAG
                  \`\`\`

                  **🔄 Mise à jour**
                  \`\`\`bash
                  yarn up $TAG
                  \`\`\`"
                else
                  echo "No PR number found, skipping comment."
                  echo "### 🚀 Nouvelle version de \`$PKG\`" >> $GITHUB_STEP_SUMMARY
                  echo "$REPORT" >> $GITHUB_STEP_SUMMARY
                fi
