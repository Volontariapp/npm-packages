name: Emergency Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: list missing packages without publishing"
        type: boolean
        default: false

jobs:
  emergency-release:
    uses: Volontariapp/ci-tools/.github/workflows/npm-job-emergency-release.yml@main
    with:
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
