name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  id-token: write
  contents: write

jobs:
  check-changelogs:
    name: Changelog Compliance
    uses: Volontariapp/ci-tools/.github/workflows/npm-packages-changelog.yml@main
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}

  test-build:
    name: Build & Test
    needs: check-changelogs
    if: needs.check-changelogs.outputs.has_changes == 'true'
    uses: Volontariapp/ci-tools/.github/workflows/npm-packages-test-build.yml@main
    with:
      changed_packages: ${{ needs.check-changelogs.outputs.changed_packages }}
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}

  release:
    name: Version Changelogs & Publish
    needs: [check-changelogs, test-build]
    if: needs.check-changelogs.outputs.has_changes == 'true' && needs.test-build.result == 'success' && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ORG_REPO_TOKEN }}
          fetch-depth: 0

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: yarn
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: yarn install --immutable

      - name: Version and publish packages
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn release:ci --changed-packages '${{ needs.check-changelogs.outputs.changed_packages }}'

      - name: Post Comment on PR
        if: github.event_name == 'pull_request' && steps.release.outputs.mode == 'snapshot' && steps.release.outputs.snapshot_tags != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAGS: ${{ steps.release.outputs.snapshot_tags }}
        run: |
          IFS=',' read -ra ADDR <<< "$TAGS"
          for i in "${ADDR[@]}"; do
            PKG=$(echo "$i" | sed 's/@[^@]*$//')
            gh pr comment ${{ github.event.pull_request.number }} --body "🚀 Nouvelle version de \`$PKG\` :
            
            \`\`\`bash
            yarn add $i
            \`\`\`"
          done

  check-package-versions:
    name: Check No Snapshot Versions
    needs: check-changelogs
    if: needs.check-changelogs.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ORG_REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0

      - name: Check package versions are not snapshots
        shell: bash
        run: bash ./scripts/CI-check-no-snapshot.sh
