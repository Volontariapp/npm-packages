name: CI

# Pipeline stages
# ───────────────
# 1. check-changelogs   Validates CHANGELOG.md compliance (ci-tools)
# 2. orchestrate        Detects changed packages, builds dependency graph,
#                       emits build_matrix + topological publish_order
# 3. test-build         Dynamic matrix — parallel test + build per package
# 4. snap-publish       Sequential topological publish (deps before consumers)
#                       + PR comment (coverage table + install snippets)
#
# No build cache: every commit triggers a full fresh cycle.

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  # ── Stage 1: Changelog compliance ─────────────────────────────────────────
  check-changelogs:
    name: Changelog Compliance
    uses: Volontariapp/ci-tools/.github/workflows/npm-packages-changelog.yml@main
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}

  # ── Stage 2: Orchestration ────────────────────────────────────────────────
  orchestrate:
    name: Orchestrate
    uses: ./.github/workflows/job-orchestrate.yml
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}

  # ── Stage 3: Parallel test + build (dynamic matrix) ───────────────────────
  test-build:
    name: Build & Test
    needs: [orchestrate]
    if: needs.orchestrate.outputs.has_changes == 'true'
    uses: Volontariapp/ci-tools/.github/workflows/npm-packages-test-build.yml@main
    with:
      changed_packages: ${{ needs.orchestrate.outputs.build_matrix }}
      snapshot_suffix:  ${{ needs.orchestrate.outputs.snapshot_suffix }}
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
      NPM_TOKEN:      ${{ secrets.NPM_TOKEN }}

  # ── Stage 4: Snapshot publish + PR comment ────────────────────────────────
  snap-publish:
    name: Snapshot Publish
    needs: [check-changelogs, orchestrate, test-build]
    if: |
      needs.orchestrate.outputs.has_changes == 'true' &&
      (
        github.event_name == 'pull_request' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    uses: ./.github/workflows/job-snap-release.yml
    with:
      json_plan: ${{ needs.orchestrate.outputs.json_plan }}
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
      NPM_TOKEN:      ${{ secrets.NPM_TOKEN }}
