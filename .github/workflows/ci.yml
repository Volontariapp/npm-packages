name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  check-changelogs:
    name: Changelog Compliance
    uses: Volontariapp/ci-tools/.github/workflows/npm-packages-changelog.yml@main
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}

  target:
    name: Preparation
    uses: ./.github/workflows/job-target-packages.yml
    with:
      changed_packages: '[]'
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}

  test-build:
    name: Build & Test
    needs: [target]
    if: ${{ needs.target.outputs.has_changes == 'true' }}
    uses: Volontariapp/ci-tools/.github/workflows/npm-packages-test-build.yml@main
    with:
      changed_packages: ${{ needs.target.outputs.test_packages }}
      snapshot_suffix: ${{ needs.target.outputs.snapshot_suffix }}
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish:
    name: Publish
    needs: [check-changelogs, target, test-build]
    if: needs.target.outputs.has_changes == 'true' && (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
    uses: ./.github/workflows/job-release.yml
    with:
      changed_packages: ${{ needs.target.outputs.packages }}
      json_plan: ${{ needs.target.outputs.json_plan }}
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  check-package-versions:
    name: Version Verification
    needs: [check-changelogs, target]
    if: needs.target.outputs.has_changes == 'true'
    uses: ./.github/workflows/job-check-versions.yml
    secrets:
      ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
