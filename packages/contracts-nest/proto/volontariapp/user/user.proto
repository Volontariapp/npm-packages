syntax = "proto3";

package volontariapp.user;

import "google/protobuf/timestamp.proto";

message OrganisationInfo {
  string rna = 1;
}

message Badge {
  string id = 1;
  string name = 2;
  string slug = 3;
  optional string icon_path = 4;
  string description = 5;
  google.protobuf.Timestamp awarded_at = 6;
}

message User {
  string id = 1;
  string email = 2;
  string pseudo = 3;
  optional string bio = 4;
  string role = 5;
  optional string logo_path = 6;
  int32 total_impact_score = 7;
  optional OrganisationInfo organisation_info = 8;
  repeated Badge badges = 9;
}
