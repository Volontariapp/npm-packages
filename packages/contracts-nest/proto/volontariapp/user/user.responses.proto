syntax = "proto3";

package volontariapp.user;

import "volontariapp/common/pagination.proto";
import "volontariapp/user/user.proto";

message UserResponse {
  User user = 1;
}

message AdminUserResponse {
  User user = 1;
}

message SignUpResponse {
  User user = 1;
  AuthResponse auth = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  volontariapp.common.PaginationResponse pagination = 2;
}

message GetMyFollowsProfilesResponse {
  repeated User users = 1;
  volontariapp.common.PaginationResponse pagination = 2;
}

message GetMyFollowersProfilesResponse {
  repeated User users = 1;
  volontariapp.common.PaginationResponse pagination = 2;
}

message UpdateUserResponse {
}

message AdminUpdateUserResponse {
}

message DeleteUserResponse {
}

message AdminDeleteUserResponse {
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LoginResponse {
  AuthResponse auth = 1;
}

message RefreshTokenResponse {
  AuthResponse auth = 1;
}

message IncrementImpactScoreResponse {
}

message CreateBadgeResponse {
  Badge badge = 1;
}

message UpdateBadgeResponse {
}

message DeleteBadgeResponse {
}

message AddBadgeToUserResponse {
}

message RemoveBadgeFromUserResponse {
}

message BadgeResponse {
  Badge badge = 1;
}

message GetBadgeBySlugResponse {
  Badge badge = 1;
}

message ListBadgesResponse {
  repeated Badge badges = 1;
  volontariapp.common.PaginationResponse pagination = 2;
}