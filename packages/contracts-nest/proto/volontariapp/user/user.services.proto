syntax = "proto3";

package volontariapp.user;

import "volontariapp/user/user.query.proto";
import "volontariapp/user/user.command.proto";
import "volontariapp/user/user.responses.proto";

service UserService {
  rpc GetUser (GetUserQuery) returns (UserResponse) {}
  rpc ListUsers (ListUsersQuery) returns (ListUsersResponse) {}
  rpc SignUp (SignUpCommand) returns (SignUpResponse) {}
  rpc UpdateUser (UpdateUserCommand) returns (UpdateUserResponse) {}
  rpc DeleteUser (DeleteUserCommand) returns (DeleteUserResponse) {}
  rpc AdminGetUser (AdminGetUserQuery) returns (AdminUserResponse) {}
  rpc AdminUpdateUser (AdminUpdateUserCommand) returns (AdminUpdateUserResponse) {}
  rpc AdminDeleteUser (AdminDeleteUserCommand) returns (AdminDeleteUserResponse) {}
  rpc Login (LoginCommand) returns (LoginResponse) {}
  rpc RefreshToken (RefreshTokenCommand) returns (RefreshTokenResponse) {}
  rpc IncrementImpactScore (IncrementImpactScoreCommand) returns (IncrementImpactScoreResponse) {}
  rpc AddBadgeToUser (AddBadgeToUserCommand) returns (AddBadgeToUserResponse) {}
  rpc RemoveBadgeFromUser (RemoveBadgeFromUserCommand) returns (RemoveBadgeFromUserResponse) {}
  rpc GetMyFollowsProfiles (GetMyFollowsProfilesQuery) returns (GetMyFollowsProfilesResponse) {}
  rpc GetMyFollowersProfiles (GetMyFollowersProfilesQuery) returns (GetMyFollowersProfilesResponse) {}
}

service BadgeService {
  rpc CreateBadge (CreateBadgeCommand) returns (CreateBadgeResponse) {}
  rpc UpdateBadge (UpdateBadgeCommand) returns (UpdateBadgeResponse) {}
  rpc DeleteBadge (DeleteBadgeCommand) returns (DeleteBadgeResponse) {}
  rpc GetBadge (GetBadgeQuery) returns (BadgeResponse) {}
  rpc ListBadges (ListBadgesQuery) returns (ListBadgesResponse) {}
  rpc GetBadgeBySlug (GetBadgeBySlugQuery) returns (GetBadgeBySlugResponse) {}
}
