syntax = "proto3";

package volontariapp.user;

import "volontariapp/user/user.proto";

message SignUpCommand {
  string email = 1;
  string password = 2;
  optional string phone = 3;
  optional string pseudo = 4;
  optional string bio = 5;
  optional string logo_path = 6;
  optional OrganisationInfo organisation_info = 7;
}

message UpdateUserCommand {
  string user_id = 1;
  optional string email = 2;
  optional string previous_password = 3;
  optional string new_password = 4;
  optional string phone = 5;
  optional string pseudo = 6;
  optional string bio = 7;
  optional string logo_path = 8;
  optional OrganisationInfo organisation_info = 9;
}

message DeleteUserCommand {
  string user_id = 1;
}

message LoginCommand {
  string email = 1;
  string password = 2;
}

message RefreshTokenCommand {
  string refresh_token = 1;
}

message IncrementImpactScoreCommand {
  string user_id = 1;
  int32 score_increment = 2;
}

message CreateBadgeCommand {
  string name = 1;
  string slug = 2;
  optional string icon_path = 3;
  string description = 4;
}

message DeleteBadgeCommand {
  string badge_id = 1;
}

message UpdateBadgeCommand {
  string badge_id = 1;
  optional string name = 2;
  optional string slug = 3;
  optional string icon_path = 4;
  optional string description = 5;
}

message AddBadgeToUserCommand {
  string user_id = 1;
  string badge_id = 2;
}

message RemoveBadgeFromUserCommand {
  string user_id = 1;
  string badge_id = 2;
}