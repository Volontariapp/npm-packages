syntax = "proto3";

package volontariapp.post;


import "google/protobuf/timestamp.proto";

message Post {
  string id = 1;
  string author_id = 2;
  string title = 3;
  string content = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  optional string event_id = 7;
}
