syntax = "proto3";

package volontariapp.social;

import "volontariapp/common/pagination.proto";

message GetSocialUserQuery {
  string user_id = 1;
}

message GetMyFollowsQuery {
  volontariapp.common.PaginationRequest pagination = 1;
}

message GetMyFollowersQuery {
  volontariapp.common.PaginationRequest pagination = 1;
}

