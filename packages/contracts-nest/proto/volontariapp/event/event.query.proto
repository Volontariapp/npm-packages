syntax = "proto3";

package volontariapp.event;

import "volontariapp/common/geo.proto";
import "volontariapp/common/pagination.proto";
import "volontariapp/event/event.proto";

message GetEventQuery {
  string id = 1;
}

message SearchEventsQuery {
  volontariapp.common.GeoCircle area = 1;
  repeated EventType types = 2;
  repeated string tag_slugs = 3;
  bool only_available = 4;
  string search_term = 5;
  string organizer_id = 6;
  repeated string ids = 7;
  repeated string excluded_ids = 8;
  optional string start_date_from = 9;
  optional string start_date_to = 10;
  repeated EventState statuses = 11;
  volontariapp.common.PaginationRequest pagination = 12;
}

message GetEventsByIdsQuery {
  repeated string ids = 1;
}

message ListRequirementsQuery {
  string event_id = 1;
}

message GetTagsQuery {
  repeated string slugs = 1;
}

message GetUserCreatedEventsQuery {
  volontariapp.common.PaginationRequest pagination = 1;
}

message GetUserParticipatedEventsQuery {
  volontariapp.common.PaginationRequest pagination = 1;
}

message GetUserWishedEventsQuery {
  volontariapp.common.PaginationRequest pagination = 1;
}
